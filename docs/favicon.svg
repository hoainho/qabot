<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- Robot head (circle) -->
  <circle cx="256" cy="228" r="120" fill="white" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="212" cy="210" r="24" fill="#7c3aed"/>
  <circle cx="300" cy="210" r="24" fill="#7c3aed"/>
  <circle cx="218" cy="204" r="8" fill="white"/>
  <circle cx="306" cy="204" r="8" fill="white"/>
  <!-- Smile -->
  <path d="M210 252 Q256 290 302 252" stroke="#7c3aed" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="256" y1="108" x2="256" y2="72" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="62" r="14" fill="#10b981"/>
  <!-- Ears -->
  <rect x="112" y="194" width="28" height="56" rx="14" fill="white" opacity="0.9"/>
  <rect x="372" y="194" width="28" height="56" rx="14" fill="white" opacity="0.9"/>
  <!-- QA text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="110" fill="white" letter-spacing="-4">QA</text>
  <!-- Checkmark badge -->
  <circle cx="370" cy="148" r="36" fill="#10b981"/>
  <path d="M352 148 L365 161 L390 136" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
